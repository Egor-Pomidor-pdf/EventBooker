<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f9f9f9;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input[type="text"], input[type="checkbox"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        input[type="checkbox"] {
            width: auto;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            border: none;
            background: #28a745;
            color: white;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #218838;
        }
        .error {
            color: red;
            margin-top: 10px;
            text-align: center;
        }
        .link {
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Регистрация</h1>
        {{if .error}}
            <div class="error">{{.error}}</div>
        {{end}}
        <form action="/ui/register" method="post">
            <label for="name">Имя пользователя:</label>
            <input type="text" id="name" name="name" placeholder="Введите имя" required>

            <label>
                <input type="checkbox" name="is_admin" value="1">
                Администратор
            </label>

            <button type="submit">Зарегистрироваться</button>
        </form>

        <div class="link">
            <a href="/ui/login">← Вход</a>
        </div>
    </div>
</body>
</html>
